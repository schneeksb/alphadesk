# CI gate: backend tests + frontend build on every push/PR.
# Note: Render/Vercel auto-deploy on push to main regardless — on main this is
# a post-hoc signal; the real gate is running it on PRs (or locally: pytest -q
# and `npm run build` in app/) before merging.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt pytest
      - name: Syntax check all Python files
        run: python -c "import ast, glob; [ast.parse(open(f, encoding='utf-8').read(), f) for f in glob.glob('*.py')]"
      - name: Run tests (no network — valuation layers stubbed)
        run: pytest tests/ -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install deps
        working-directory: app
        run: npm ci
      - name: Build
        working-directory: app
        run: npm run build
