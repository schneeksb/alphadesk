# Render Blueprint for the AlphaDesk backend (research.py FastAPI app).
# In Render: New + → Blueprint → connect this repo. It reads this file.
services:
  - type: web
    name: alphadesk-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn research:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set this in the Render dashboard (do NOT commit your key)
      - key: SUPABASE_URL
        sync: false          # https://<project>.supabase.co — Market Pulse reads market_pulse from here
      - key: SUPABASE_ANON_KEY
        sync: false          # anon PUBLIC key only (read-only via RLS) — NEVER the service_role key
      - key: PYTHON_VERSION
        value: "3.11.9"

# Scheduled Market Brief runs live in GitHub Actions (free) instead of a Render
# cron job — see .github/workflows/market-brief.yml
