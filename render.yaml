# Render Blueprint for the AlphaDesk backend (research.py FastAPI app).
# In Render: New + → Blueprint → connect this repo. It reads this file.
services:
  - type: web
    name: alphadesk-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn research:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set this in the Render dashboard (do NOT commit your key)
      - key: SUPABASE_URL
        sync: false          # https://<project>.supabase.co — Market Pulse reads market_pulse from here
      - key: SUPABASE_ANON_KEY
        sync: false          # anon PUBLIC key only (read-only via RLS) — NEVER the service_role key
      - key: PYTHON_VERSION
        value: "3.11.9"

  # Pre-market Market Brief agent — runs the tool-use loop and writes the brief
  # to Supabase. Weekdays 11:45 UTC ≈ 7:45am ET during DST (12:45 UTC in winter —
  # adjust the hour when clocks change, cron is UTC-only). Cron jobs bill only
  # for runtime (~pennies/month at a few minutes/day).
  - type: cron
    name: alphadesk-brief
    runtime: python
    plan: starter
    region: oregon
    schedule: "45 11 * * 1-5"
    buildCommand: pip install -r requirements.txt
    startCommand: python run_market_brief.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set in dashboard
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false          # service key lives ONLY on this private cron job — never the web service or frontend
      - key: PYTHON_VERSION
        value: "3.11.9"
